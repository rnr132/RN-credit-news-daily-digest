name: Weekly Article Ideas
on:
  schedule:
    # Runs every Monday at 09:00 UTC — adjust to suit your week-start
    - cron: '0 9 * * 1' # Monday 09:00 UTC
    - cron: '0 9 * * 3'   # Wednesday 09:00 UTC
    - cron: '0 9 * * 5'   # Friday 09:00 UTC
  workflow_dispatch: {}  # allows manual trigger from the Actions tab
jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install anthropic
      - name: Generate weekly article ideas
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # This repo stores the full history as a single JSON file at the
          # root (produced by scripts/generate_digest.py), not per-day files
          # in a folder — point the script at that file directly.
          WATCHLIST_HISTORY_FILE: 'digest_history.json'
          # Writes output to the repo root, alongside index.html/archive.html,
          # so it can be linked from either page if you want.
          OUTPUT_DIR: 'article_ideas'
        run: python scripts/watchlist_article_ideas.py
      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add article_ideas
          git diff --staged --quiet || git commit -m "Weekly article ideas: $(date +'%Y-%m-%d')"
          git push
