name: Daily Watchlist Digest

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python scripts/generate_digest.py

      - name: Commit and push updated page
        run: |
          git config user.name "watchlist-bot"
          git config user.email "watchlist-bot@users.noreply.github.com"
          git add index.html archive.html digest_history.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily digest: $(date -u +'%Y-%m-%d')"
          git push
