name: Weekly Article Ideas

on:
  schedule:
    # Runs every Monday at 06:00 UTC — adjust to suit your week-start
    - cron: '0 6 * * 1'
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate weekly article ideas
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Point this at wherever your daily digests are stored in-repo.
          # Adjust to match your actual Watchlist archive path.
          WATCHLIST_ARCHIVE_DIR: 'docs/archive'
          # Writes output straight into the Pages-served folder.
          OUTPUT_DIR: 'docs/ideas'
        run: python scripts/watchlist_article_ideas.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ideas
          git diff --staged --quiet || git commit -m "Weekly article ideas: $(date +'%Y-%m-%d')"
          git push
